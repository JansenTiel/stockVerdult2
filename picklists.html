<script>
function buildPrintHtmlFromGroups(title, subtitleLines, groups){
  function buildHandwriteLines(qty){
    const n = Math.max(1, Number(qty || 0));

    return `
      <div style="margin-top:8px">
        ${Array.from({ length: n }).map((_, i) => `
          <div style="
            display:flex;
            align-items:center;
            gap:10px;
            margin-top:6px;
            font-size:12px;
            color:#334155;
          ">
            <div style="min-width:22px;font-weight:700;">${i + 1}.</div>
            <div style="min-width:110px;font-weight:700;">Volgnummer:</div>
            <div style="
              flex:1;
              border-bottom:1px solid #111827;
              height:18px;
            "></div>
            <div style="min-width:80px;font-weight:700;">Afgevinkt:</div>
            <div style="
              width:18px;
              height:18px;
              border:1px solid #111827;
            "></div>
          </div>
        `).join('')}
      </div>
    `;
  }

  return `
    <div class="print-sheet" id="printSheet">
      <div class="print-header">
        <div class="print-title">${escapeHtml(title)}</div>
        <div class="print-sub">
          ${subtitleLines.map(line => escapeHtml(line)).join('<br>')}
        </div>
      </div>

      ${groups.map(group => `
        <div class="print-order">
          <div class="print-order-top">${escapeHtml(group.blockTitle)}</div>
          <table class="print-table">
            <thead>
              <tr>
                <th>Order</th>
                <th>SKU</th>
                <th>Product</th>
                <th>Aantal</th>
                <th>Locaties</th>
              </tr>
            </thead>
            <tbody>
              ${group.rows.map(line => `
                <tr>
                  <td>${escapeHtml(line.source_order_no || '-')}</td>
                  <td><b>${escapeHtml(line.sku_base)}</b></td>
                  <td>
                    ${escapeHtml(line.product_name)}
                    ${buildHandwriteLines(line.qty_needed)}
                  </td>
                  <td>${line.qty_needed}</td>
                  <td>${escapeHtml(line.location_summary || getLocationSummaryForSku(line.sku_base) || '-')}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `).join('')}
    </div>
  `;
}
</script>
