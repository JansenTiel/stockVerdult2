<!doctype html><html lang="nl"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Uitscans</title><link rel="stylesheet" href="/css/theme.css"/><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/js/supabase.js"></script><script src="/js/app.js"></script><script src="/js/auth.js"></script></head><body data-page="outscans"><div class="topbar no-print"><div class="inner"><div class="brand"><div class="logo">o</div><div class="title">Oegema Logistics <small>Ronald Verdult Design · Voorraadbeheer</small></div></div><nav class="nav"><a href="/index.html">Dashboard</a><a href="/products.html">Artikelen + Stickers</a><a href="/scan.html">In-/Uitscan</a><a href="/stock.html">Huidige voorraad</a><a href="/outscans.html">Uitscans</a></nav><div class="rightbar"><span class="pill"><span id="userEmail"></span></span><button class="btn" id="btnLogout" type="button">Uitloggen</button></div></div></div><div class="container"><div id="toast" class="notice"></div><div class="card"><h2>Uitscans</h2><div class="muted">Filterbaar op ordernummer, SKU en omschrijving.</div><div class="row-4" style="margin-top:14px"><div><label for="q">Zoeken</label><input id="q" placeholder="Ordernummer / SKU / omschrijving"/></div><div><label for="sort">Sorteren op</label><select id="sort"><option value="created_at_desc">Nieuwste eerst</option><option value="created_at_asc">Oudste eerst</option><option value="order_no_asc">Ordernummer A-Z</option><option value="sku_unique_asc">SKU A-Z</option><option value="name_asc">Omschrijving A-Z</option></select></div><div><label>&nbsp;</label><button class="btn primary" id="btn_refresh" type="button" style="width:100%">Verversen</button></div><div><label>&nbsp;</label><span class="pill ok" id="outCount">0 uitscans</span></div></div></div><div class="card" style="margin-top:16px"><div class="table-wrap"><div id="list"></div></div></div></div><script>setActiveNav();const client=sb();function sortRows(items,sort){const rows=[...(items||[])],cmp=(a,b)=>String(a??'').localeCompare(String(b??''),'nl');if(sort==='created_at_desc')rows.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));if(sort==='created_at_asc')rows.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));if(sort==='order_no_asc')rows.sort((a,b)=>cmp(a.order_no,b.order_no));if(sort==='sku_unique_asc')rows.sort((a,b)=>cmp(a.sku_unique,b.sku_unique));if(sort==='name_asc')rows.sort((a,b)=>cmp(a.products?.name,b.products?.name));return rows}async function load(){const q=(byId('q').value||'').trim();const sort=byId('sort').value;let query=client.from('movements').select('created_at,sku_unique,order_no,location,products(name,sku_base)').eq('type','OUT').limit(5000);if(q)query=query.or(`sku_unique.ilike.%${q}%,order_no.ilike.%${q}%`);const {data,error}=await query;if(error) throw error;let rows=sortRows(data,sort);if(q){const qq=q.toLowerCase();rows=rows.filter(r=>String(r.products?.name||'').toLowerCase().includes(qq)||String(r.sku_unique||'').toLowerCase().includes(qq)||String(r.order_no||'').toLowerCase().includes(qq))}byId('outCount').textContent=`${rows.length} uitscans`;const el=byId('list');if(!rows.length){el.innerHTML='<div class="card" style="box-shadow:none;border:none">Nog geen uitscans.</div>';return}el.innerHTML=`<table><thead><tr><th>Tijd</th><th>SKU uniek</th><th>Product</th><th>Locatie</th><th>Ordernummer</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${nlTime(r.created_at)}</td><td><b>${escapeHtml(r.sku_unique)}</b></td><td>${escapeHtml(r.products?.name||'')} <span class="muted">(${escapeHtml(r.products?.sku_base||'')})</span></td><td>${escapeHtml(r.location||'')}</td><td><b>${escapeHtml(r.order_no||'')}</b></td></tr>`).join('')}</tbody></table>`}byId('btn_refresh').addEventListener('click',()=>load().catch(e=>toast(e.message||String(e),'err')));byId('q').addEventListener('keydown',e=>{if(e.key==='Enter')load().catch(err=>toast(err.message||String(err),'err'))});byId('sort').addEventListener('change',()=>load().catch(e=>toast(e.message||String(e),'err')));load().catch(e=>toast(e.message||String(e),'err'));</script></body></html>
